name: Detection Pipeline Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-pipeline:
    name: Run replay harness regression tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate schema contracts
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'Pipeline')
          from ingest import load_directory
          from normalize import normalize_events
          from schema_validator import validate_events
          events = load_directory('telemetry/raw/chain1_c2_beacon')
          normalised = normalize_events(events)
          valid, rejected = validate_events(normalised)
          assert len(rejected) == 0, f'Schema rejected {len(rejected)} events'
          print(f'Schema validation passed: {len(valid)} valid events')
          "

      - name: Run full detection regression suite
        run: python Pipeline/replay_harness.py --suite all --verbose --report

      - name: Validate chain1 C2 beacon pipeline
        run: |
          python Pipeline/run_pipeline.py \
            --input-dir telemetry/raw/chain1_c2_beacon \
            --output /tmp/chain1_alerts.json \
            --window 60 \
            --quiet
          python -c "
          import json
          with open('/tmp/chain1_alerts.json') as f:
              result = json.load(f)
          alerts = result.get('alerts', [])
          assert len(alerts) >= 1, f'Expected at least 1 alert, got {len(alerts)}'
          a = alerts[0]
          assert a['detection_id'] == 'DET-CHAIN-T1059.001-T1071.001-ExecToC2-v1'
          assert a['source_diversity'] >= 2, f'Expected source_diversity >= 2, got {a[\"source_diversity\"]}'
          assert a['confidence_score'] >= 0.40, f'Confidence too low: {a[\"confidence_score\"]}'
          print(f'Chain1 validation passed: confidence={a[\"confidence_score\"]}, diversity={a[\"source_diversity\"]}')
          "

      - name: Validate clean baseline produces zero alerts
        run: |
          python Pipeline/run_pipeline.py \
            --input telemetry/raw/clean_baseline.json \
            --output /tmp/baseline_alerts.json \
            --quiet
          python -c "
          import json
          with open('/tmp/baseline_alerts.json') as f:
              result = json.load(f)
          alerts = result.get('alerts', [])
          assert len(alerts) == 0, f'False positives on clean baseline: {len(alerts)} alert(s) — {[a[\"detection_id\"] for a in alerts]}'
          print('Clean baseline validation passed: 0 false positives')
          "

      - name: Upload CI report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: detection-validation-report
          path: reports/ci/replay_harness_report.json
          if-no-files-found: ignore
